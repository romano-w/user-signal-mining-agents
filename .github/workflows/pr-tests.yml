name: PR Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  branch-ready-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run branch-ready gate
        run: uv run python scripts/ci/run_research_gate.py --level branch-ready

      - name: Upload coverage and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-test-artifacts
          if-no-files-found: ignore
          path: |
            coverage.xml
            artifacts/test-results/branch-ready-junit.xml
